<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Signup | TikTok Shop KE</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .signup-container {
      background-color: #111;
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 20px rgba(222, 49, 99, 0.4);
    }
    h1 {
      color: #DE3163;
      text-align: center;
      margin-bottom: 30px;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-bottom: 5px;
      font-weight: 600;
    }
    input {
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 16px;
    }
    input[type="submit"] {
      background-color: #DE3163;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    input[type="submit"]:hover {
      background-color: #c02657;
    }
    .note {
      font-size: 14px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h1>Seller Signup</h1>
    <form id="sellerSignupForm">
      <label for="name">Full Name / Business Name</label>
      <input type="text" id="name" name="name" placeholder="John Doe or ABC Store" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="07XXXXXXXX" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" required>

      <label for="tiktok">TikTok Handle (Optional)</label>
      <input type="text" id="tiktok" name="tiktok" placeholder="@yourhandle">

      <input type="submit" value="Create Seller Account">
    </form>
    <p class="note">By signing up, you agree to our 5% commission per sale.</p>
  </div>

  <script>
    const form = document.getElementById('sellerSignupForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if(password !== confirmPassword){
        alert('Passwords do not match!');
        return;
      }

      // TODO: Connect to backend API to create seller account
      alert('Seller account created successfully! You can now log in.');
      form.reset();
    });
  </script>
</body>
</html>
